<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F5257"/>
      <stop offset="100%" style="stop-color:#0D1B1E"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3B64C"/>
      <stop offset="50%" style="stop-color:#F5D78E"/>
      <stop offset="100%" style="stop-color:#C49426"/>
    </linearGradient>
  </defs>
  
  <!-- Fondo con esquinas redondeadas -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>
  
  <!-- Borde dorado sutil -->
  <rect x="2" y="2" width="96" height="96" rx="18" fill="none" stroke="url(#gold)" stroke-width="2"/>
  
  <!-- Letra A estilizada -->
  <text x="50" y="70" font-family="'Tenor Sans', 'Georgia', serif" font-size="50" fill="url(#gold)" text-anchor="middle" font-weight="400">A</text>
  
  <!-- Círculo decorativo sutil -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="#E3B64C" stroke-width="0.5" opacity="0.3"/>
</svg>